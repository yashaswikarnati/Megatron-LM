# M1: ViT-3B + LLM-32B (16 GPUs) | Encoder/LLM ratio ~0.09x
# Tests: multi-node scaling with high asymmetry, TP8/DP2
experiment:
  name: "m1_vit3b_llm32b"
  num_iterations: 10
  warmup_iterations: 2
  log_interval: 1
model:
  encoder:
    num_layers: 48
    hidden_size: 2304
    num_attention_heads: 36
    seq_length: 1024
  llm:
    num_layers: 64
    hidden_size: 6144
    num_attention_heads: 48
    vocab_size: 32000
    seq_length: 8192
parallelism:
  encoder: { tp: 8, dp: 2 }
  llm: { tp: 8, dp: 2 }
data:
  micro_batch_size: 1
  num_microbatches: 2
  image_token_id: 32000
