# S7: ViT-S (0.3B) + LLM-7B | Encoder/LLM ratio ~0.04x
# Tests: extreme asymmetry with tiny encoder, LLM-dominated workload
experiment:
  name: "s7_vitS_llm7b"
  num_iterations: 10
  warmup_iterations: 2
  log_interval: 1
model:
  encoder:
    num_layers: 27
    hidden_size: 1152
    num_attention_heads: 16
    seq_length: 576
  llm:
    num_layers: 32
    hidden_size: 4096
    num_attention_heads: 32
    vocab_size: 32000
    seq_length: 8192
parallelism:
  encoder: { tp: 4, dp: 2 }
  llm: { tp: 4, dp: 2 }
data:
  micro_batch_size: 2
  num_microbatches: 2
  image_token_id: 32000
