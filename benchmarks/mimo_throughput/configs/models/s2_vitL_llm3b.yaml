# S2: ViT-L (0.9B) + LLM-3B | Encoder/LLM ratio ~0.3x
# Tests: moderate asymmetry with medium LLM, TP2 parallelism
experiment:
  name: "s2_vitL_llm3b"
  num_iterations: 10
  warmup_iterations: 2
  log_interval: 1
model:
  encoder:
    num_layers: 40
    hidden_size: 1408
    num_attention_heads: 16
    seq_length: 576
  llm:
    num_layers: 28
    hidden_size: 3072
    num_attention_heads: 24
    vocab_size: 32000
    seq_length: 8192
parallelism:
  encoder: { tp: 2, dp: 4 }
  llm: { tp: 2, dp: 4 }
data:
  micro_batch_size: 4
  num_microbatches: 2
  image_token_id: 32000
