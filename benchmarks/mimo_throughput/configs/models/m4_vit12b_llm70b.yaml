# M4: ViT-12B + LLM-70B (64 GPUs) | Encoder/LLM ratio ~0.17x
# Tests: largest scale multi-node, massive encoder + LLM, TP8/DP8
experiment:
  name: "m4_vit12b_llm70b"
  num_iterations: 10
  warmup_iterations: 2
  log_interval: 1
model:
  encoder:
    num_layers: 48
    hidden_size: 4608
    num_attention_heads: 36
    seq_length: 1024
  llm:
    num_layers: 80
    hidden_size: 8192
    num_attention_heads: 64
    vocab_size: 32000
    seq_length: 8192
parallelism:
  encoder: { tp: 8, dp: 8 }
  llm: { tp: 8, dp: 8 }
data:
  micro_batch_size: 1
  num_microbatches: 2
  image_token_id: 32000
