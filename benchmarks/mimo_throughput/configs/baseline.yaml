# Default config: ~1B ViT + ~3B LLM on 8 GPUs.
# All experiment configs in this directory inherit from this file.
#
# Vision: 40 layers, H=1408, 16 heads (~0.95B params)
# LLM:    26 layers, H=3072, 32 heads, vocab=32000 (~3B params)

experiment:
  name: "homogeneous_tp4_dp2"
  num_iterations: 10
  warmup_iterations: 2
  log_interval: 1

model:
  encoder:
    num_layers: 40
    hidden_size: 1408
    num_attention_heads: 16
    seq_length: 1024
  llm:
    num_layers: 26
    hidden_size: 3072
    num_attention_heads: 32
    vocab_size: 32000
    seq_length: 8192

parallelism:
  encoder: { tp: 4, dp: 2 }
  llm: { tp: 4, dp: 2 }

data:
  micro_batch_size: 2
  num_microbatches: 2
  image_token_id: 32000
