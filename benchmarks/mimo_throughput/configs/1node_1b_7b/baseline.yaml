# 1B ViT + 7B LLM on 8xH100 — baseline shared by all experiments.
#
# Vision: 40 layers, H=1408, 16 heads, seq=2048 (~0.95B params)
# LLM:    32 layers, H=4096, 32 heads, vocab=32000, seq=8192 (~7B params)
#
# Homogeneous baseline: both modules at TP4/DP2.

experiment:
  name: "homo_tp4_dp2"
  num_iterations: 10
  warmup_iterations: 2
  log_interval: 1

model:
  encoder:
    num_layers: 40
    hidden_size: 1408
    num_attention_heads: 16
    seq_length: 2048
  llm:
    num_layers: 32
    hidden_size: 4096
    num_attention_heads: 32
    vocab_size: 32000
    seq_length: 8192

parallelism:
  encoder: { tp: 4, dp: 2 }
  llm: { tp: 4, dp: 2 }

data:
  micro_batch_size: 2
  num_microbatches: 2
  image_token_id: 32000
