# Fan-in with larger batch: enc TP2/DP4, LLM TP4/DP2, mbs=4
# Hypothesis: doubling batch increases GEMM utilization, reduces communication fraction
experiment:
  name: "hetero_enc_tp2dp4_llm_tp4dp2_mbs4"

parallelism:
  encoder: { tp: 2, dp: 4 }
  llm: { tp: 4, dp: 2 }

data:
  micro_batch_size: 4
  num_microbatches: 2
